<!DOCTYPE html>
<html>

<head>

<title>Create Account</title>

<link rel="stylesheet" href="../css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Create Account</h2>

<form action="otp.html">

<input class="form-control mb-2" placeholder="Full Name" required>

<input type="date" class="form-control mb-2" required>

<select class="form-control mb-2" required>

<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>

</select>

<input class="form-control mb-2" placeholder="Phone Number" required>

<input type="email" class="form-control mb-2" placeholder="Email" required>

<input class="form-control mb-2" placeholder="City" required>

<input type="password" class="form-control mb-2" placeholder="Password" required>

<input type="password" class="form-control mb-3" placeholder="Confirm Password" required>

<button type="submit" class="btn btn-primary w-100">Submit</button>

</form>

</div>

</body>
</html>
